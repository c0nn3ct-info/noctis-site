<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="آنچه Noctis جمع‌آوری نمی‌کند: نه گزارش ترافیک، نه تله‌متری، نه تحلیل. کانفیگ‌های سرور در حافظه مرورگر باقی می‌مانند. تفکیک کامل مجوزهای Chrome و دلیل هر کدام."
    />
    <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>سیاست حریم خصوصی — افزونه پراکسی مرورگر Noctis</title>
    <script>
      (function () {
        try {
          document.documentElement.classList.add(
            window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          );
        } catch (e) {}
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="../../../src/entries/privacy.tsx"></script>
  </body>
