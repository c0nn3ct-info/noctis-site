<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Route your browser through VLESS, VMess, Trojan, Shadowsocks, Hysteria/2, TUIC, WireGuard &amp; more via a local sing-box helper."
    />
    <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://chrome.google.com" />
    <link rel="preconnect" href="https://github.com" />
    <title>Noctis - Browser Proxy</title>
    <script>
      (function () {
        try {
          if (localStorage.getItem('noctis-locale')) return;
          var l = (navigator.language || '').toLowerCase();
          var loc = 'en';
          if (l.indexOf('ru') === 0) loc = 'ru';
          else if (l.indexOf('es') === 0) loc = 'es';
          else if (l.indexOf('zh') === 0) loc = 'zh-CN';
          else if (l.indexOf('fa') === 0 || l.indexOf('pe') === 0) loc = 'fa';
          else if (l.indexOf('ar') === 0) loc = 'ar';
          localStorage.setItem('noctis-locale', loc);
          if (loc !== 'en') {
            var p = location.pathname;
            location.replace('/' + loc + (p === '/' ? '/' : p) + location.search + location.hash);
          }
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          document.documentElement.classList.add(
            window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          );
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="../src/entries/home.tsx"></script>
  </body>
</html>
